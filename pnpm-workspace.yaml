packages:
  - 'packages/*'
  - 'apps/*'

# Single source of truth for shared dev-tool versions (pnpm catalog). Every package
# references these with `catalog:` instead of pinning its own range, so the toolchain
# version can never drift across the workspace and bumps happen in one place.
catalog:
  '@eslint/js': ^9.17.0
  '@vitest/coverage-v8': ^3.0.0
  eslint: ^9.17.0
  eslint-config-prettier: ^9.1.0
  prettier: ^3.4.2
  turbo: ^2.3.3
  typescript: ^5.7.2
  typescript-eslint: ^8.18.1
  vitest: ^3.0.0
  # Type packages (dev): @types/node is pinned to the `engines` runtime FLOOR
  # (node >=20.11.0), NOT .nvmrc's dev/CI version (22), so a Node-22-only API (e.g.
  # `node:sqlite`, which ADR-0021 rejects for needing >=22.5) is a type error rather than
  # a runtime break on the supported floor.
  '@types/better-sqlite3': ^7.6.13
  # Dev/type-only: the `JSONSchema7` type for the `@relavium/llm` seam's `ToolDef.parameters`
  # (a type-only import, erased at build ŌĆö no runtime dependency, so no ADR needed).
  '@types/json-schema': ^7.0.15
  '@types/node': ^20.11.0
  drizzle-kit: ^0.31.10
  # Runtime
  zod: ^3.23.0
  # The engine's YAML loader ŌĆö pure-JS, confined to @relavium/core (ADR-0035). Decodes an
  # authored `.relavium.yaml` to a plain JS object that the strict WorkflowSchema validates.
  yaml: ^2.9.0
  # The engine's expression sandbox ŌĆö QuickJS-wasm for condition/transform/merge_fn
  # (ADR-0027 + reference/shared-core/expression-sandbox-spec.md). `quickjs-emscripten-core`
  # is the pure-TS bindings; the singlefile-SYNC variant embeds the wasm as bytes (no
  # node:fs/fetch), instantiated via the standard WebAssembly global so the engine stays
  # platform-free in Node, the Tauri WebView, the VS Code host, and Bun. The default
  # `getQuickJS()` loader is NOT used (it imports node:fs). Pinned by the 1.AB perf spike.
  quickjs-emscripten-core: ^0.32.0
  '@jitl/quickjs-singlefile-mjs-release-sync': ^0.32.0
  # @relavium/db persistence stack ŌĆö Drizzle ORM (ADR-0005) over better-sqlite3,
  # the pinned Node-side SQLite driver (ADR-0021).
  drizzle-orm: ^0.45.2
  better-sqlite3: ^12.10.0
  # Provider SDKs ŌĆö imported ONLY inside packages/llm/src/adapters/* (the seam fence, 0.F).
  # The official SDKs chosen by ADR-0011 + tech-stack.md; adding them here realizes that
  # decision (no new ADR). The OpenAI-compatible (`openai`) adapter serves OpenAI + DeepSeek
  # (DeepSeek via a custom baseURL); `@google/genai` backs the Gemini adapter (1.G / 1.H).
  '@anthropic-ai/sdk': ^0.101.0
  openai: ^6.42.0
  '@google/genai': ^2.8.0
  # apps/cli surface deps ŌĆö the CLI command framework (ADR-0047) and the TOML config
  # parser (ADR-0048). Confined to apps/cli; the engine-deps guard excludes apps/, so these
  # never enter an engine package. `tsup` is the build tool (toolchain), catalogued like turbo.
  # Each declared in apps/cli's manifest at the workstream that first needs it (commander/tsup
  # at 2.A; smol-toml at 2.B; @napi-rs/keyring at 2.C). Versions taken under the ┬¦9a cooling window.
  commander: ^12.1.0
  smol-toml: ^1.3.4
  tsup: ^8.5.0
  # CLI OS-keychain accessor (2.C) ŌĆö a maintained N-API credential lib, NOT the archived
  # keytar (ADR-0019); confined to apps/cli behind a `KeychainStore` interface. Floor pinned to the
  # resolved/audited 1.3.x so the audited version is the shipped version (the most security-sensitive
  # native dep ŌĆö a re-pin, not a silent caret drift).
  '@napi-rs/keyring': ^1.3.0
  # CLI streaming TUI (2.E, ADR-0047) ŌĆö `ink` (React for terminals) + its required `react` peer; the
  # `@types/react` peer is optional (dev-only, for typecheck). ink 6.x is the major that honors BOTH the
  # tech-stack React 19 pin AND the Node Ōēź20.11 supported floor (ink 7 requires Node Ōēź22; ink 5 wants
  # React 18) ŌĆö see tech-stack.md. Confined to apps/cli's renderer layer, inlined by tsup. ┬¦9a cooling window.
  ink: ^6.8.0
  react: ^19.2.7
  '@types/react': ^19.2.17
